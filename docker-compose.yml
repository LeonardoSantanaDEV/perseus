services:
  postgres:
    image: postgres:16-alpine
    container_name: orch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orch
      POSTGRES_PASSWORD: orch
      POSTGRES_DB: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orch_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: orch_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # Cria o bucket inicial automaticamente
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'aguardando minio...' && sleep 2; done;
      /usr/bin/mc mb -p local/bot-packages;
      /usr/bin/mc mb -p local/bot-artifacts;
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
