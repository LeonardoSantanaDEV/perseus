[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "orchestrator-sdk"
version = "0.1.0"
description = "SDK Python para conectar bots ao Bot Orchestrator (estilo Maestro)"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["requests>=2.31.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["orchestrator_sdk*"]
